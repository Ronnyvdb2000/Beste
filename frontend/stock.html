<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <title>Wekelijkse stock</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <h1>Wekelijkse stock</h1>

  <form id="stock-form">
    <label>Product ID</label>
    <input type="number" id="product_id" required>

    <label>Weeknummer</label>
    <input type="number" id="week" required>

    <label>Stock aanvang</label>
    <input type="number" id="stock_aanvang" required>

    <label>Stock einde</label>
    <input type="number" id="stock_einde" required>

    <button type="submit">Opslaan</button>
  </form>

  <p id="result"></p>

  <script src="js/api.js"></script>
  <script src="js/stock.js"></script>
</body>
</html>
