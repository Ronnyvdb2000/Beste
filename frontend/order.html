<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <title>Bestelling</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <h1>Bestelvoorstel</h1>

  <form id="proposal-form">
    <label>Product ID</label>
    <input type="number" id="product_id" required>

    <label>Weeknummer</label>
    <input type="number" id="week" required>

    <button type="submit">Maak voorstel</button>
  </form>

  <p id="proposal-result"></p>

  <form id="final-form" style="display:none;">
    <label>Order ID</label>
    <input type="number" id="order_id" readonly>

    <label>Definitieve hoeveelheid</label>
    <input type="number" id="definitief" required>

    <label>Email leverancier</label>
    <input type="email" id="email_leverancier" required>

    <button type="submit">Verstuur bestelling</button>
  </form>

  <p id="final-result"></p>

  <script src="js/api.js"></script>
  <script src="js/order.js"></script>
</body>
</html>
