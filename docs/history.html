<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <title>Stock App - Historiek</title>
  <link rel="stylesheet" href="css/style.css">
  <style>
    table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 1rem;
      font-size: 0.95rem;
    }
    th, td {
      border: 1px solid #ddd;
      padding: 8px 10px;
      text-align: center;
    }
    th {
      background-color: #3b82f6;
      color: white;
      font-weight: bold;
    }
    tr:nth-child(even) { background-color: #f1f5f9; }
    td:nth-child(2) { text-align: left; }
    .badge-ja {
      background-color: #d1fae5;
      color: #065f46;
      padding: 2px 8px;
      border-radius: 12px;
      font-weight: bold;
      font-size: 0.85rem;
    }
    .badge-nee {
      background-color: #fee2e2;
      color: #991b1b;
      padding: 2px 8px;
      border-radius: 12px;
      font-weight: bold;
      font-size: 0.85rem;
    }
    .tabel-wrapper {
      background: white;
      border-radius: 10px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.1);
      padding: 1rem;
      overflow-x: auto;
    }
    .nav-links { margin-top: 2rem; display: flex; gap: 1rem; }
    .nav-links a { color: #3b82f6; text-decoration: none; font-weight: 500; }
    .nav-links a:hover { text-decoration: underline; }
    .filter-bar {
      display: flex;
      align-items: center;
      gap: 1rem;
      margin-bottom: 1rem;
      background: white;
      padding: 1rem;
      border-radius: 10px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.1);
      flex-wrap: wrap;
    }
    .filter-bar label { font-weight: bold; margin: 0; }
    .filter-bar input {
      width: 100px;
      padding: 6px 10px;
      border: 1px solid #ccc;
      border-radius: 6px;
      font-size: 1rem;
    }
    .btn {
      padding: 8px 18px;
      border: none;
      border-radius: 8px;
      font-size: 0.95rem;
      font-weight: bold;
      cursor: pointer;
      color: white;
    }
    .btn-blauw { background-color: #3b82f6; }
    .btn-blauw:hover { background-color: #2563eb; }
    .btn-reset {
      background-color: #6b7280;
    }
    .btn-reset:hover { background-color: #4b5563; }
    .resend-bar {
      display: flex;
      align-items: center;
      gap: 1rem;
      margin-top: 1.5rem;
      background: white;
      padding: 1rem;
      border-radius: 10px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.1);
      flex-wrap: wrap;
    }
    .resend-bar label { font-weight: bold; margin: 0; }
    .resend-bar input {
      width: 100px;
      padding: 6px 10px;
      border: 1px solid #ccc;
      border-radius: 6px;
      font-size: 1rem;
    }
    .resend-bar input[type="email"] { width: 220px; }
    .btn-oranje { background-color: #f59e0b; }
    .btn-oranje:hover { background-color: #d97706; }
    #resend-msg { margin-top: 0.8rem; font-weight: bold; }
    #laad-msg { color: #888; }
  </style>
</head>
<body>
  <script>
    if (localStorage.getItem("loggedIn") !== "true") {
      window.location.href = "index.html";
    }
  </script>

  <h1>📜 Historiek</h1>

  <div class="filter-bar">
    <label for="filter-week">Filter op week:</label>
    <input type="number" id="filter-week" min="1" max="53" placeholder="bv. 23">
    <button class="btn btn-blauw" onclick="loadHistory()">🔍 Filteren</button>
    <button class="btn btn-reset" onclick="resetFilter()">↺ Alles tonen</button>
  </div>

  <div class="tabel-wrapper">
    <table>
      <thead>
        <tr>
          <th>#</th>
          <th>Product</th>
          <th>Week</th>
          <th>Voorstel</th>
          <th>Definitief</th>
          <th>Verstuurd</th>
        </tr>
      </thead>
      <tbody id="history-body">
        <tr><td colspan="6" id="laad-msg">Historiek laden...</td></tr>
      </tbody>
    </table>
  </div>

  <div class="resend-bar">
    <label for="resend-week">Week opnieuw versturen:</label>
    <input type="number" id="resend-week" min="1" max="53" placeholder="bv. 23">
    <input type="email" id="resend-email" placeholder="leverancier@voorbeeld.be">
    <button class="btn btn-oranje" onclick="opnieuwVersturen()">🔁 Opnieuw versturen</button>
  </div>
  <div id="resend-msg"></div>

  <div class="nav-links">
    <a href="stock.html">📦 Stock ingeven</a>
    <a href="order.html">📋 Bestelvoorstel</a>
    <a href="verbruik.html">📊 Verbruik</a>
    <a href="index.html" onclick="localStorage.removeItem('loggedIn')">🚪 Uitloggen</a>
  </div>

  <script src="js/api.js"></script>
  <script>
    function resetFilter() {
      document.getElementById('filter-week').value = '';
      loadHistory();
    }

    async function loadHistory() {
      const tbody = document.getElementById('history-body');
      const filterWeek = document.getElementById('filter-week').value;

      tbody.innerHTML = '<tr><td colspan="6" id="laad-msg">Historiek laden...</td></tr>';

      try {
        let rows = await apiGet('/history');

        if (filterWeek) {
          rows = rows.filter(r => String(r.week) === String(Number(filterWeek)));
        }

        if (rows.length === 0) {
          tbody.innerHTML = '<tr><td colspan="6" style="text-align:center; color:#888;">Geen bestellingen gevonden' + (filterWeek ? ` voor week ${filterWeek}` : '') + '.</td></tr>';
          return;
        }

        tbody.innerHTML = '';
        rows.forEach(row => {
          const tr = document.createElement('tr');
          tr.innerHTML = `
            <td>${row.id}</td>
            <td>${row.naam}</td>
            <td>${row.week}</td>
            <td>${row.voorstel ?? '-'}</td>
            <td>${row.definitief ?? '-'}</td>
            <td><span class="${row.verstuurd ? 'badge-ja' : 'badge-nee'}">${row.verstuurd ? 'Ja' : 'Nee'}</span></td>
          `;
          tbody.appendChild(tr);
        });
      } catch (err) {
        tbody.innerHTML = '<tr><td colspan="6" style="color:red; text-align:center;">❌ Fout bij laden historiek.</td></tr>';
      }
    }

    async function opnieuwVersturen() {
      const week = Number(document.getElementById('resend-week').value);
      const email = document.getElementById('resend-email').value;
      const msgEl = document.getElementById('resend-msg');

      if (!week) {
        msgEl.style.color = 'red';
        msgEl.textContent = '⚠️ Vul een weeknummer in.';
        return;
      }
      if (!email) {
        msgEl.style.color = 'red';
        msgEl.textContent = '⚠️ Vul een email leverancier in.';
        return;
      }

      msgEl.style.color = '#888';
      msgEl.textContent = 'Bezig met versturen...';

      try {
        const res = await apiPost('/order/resend', { week, email_leverancier: email });
        msgEl.style.color = 'green';
        msgEl.textContent = `✅ Week ${week} opnieuw verstuurd naar ${email} (${res.aantal} producten, met vermelding "reeds verstuurd").`;
        loadHistory();
      } catch (err) {
        msgEl.style.color = 'red';
        msgEl.textContent = '❌ ' + (err.message || 'Fout bij opnieuw versturen.');
      }
    }

    loadHistory();
  </script>
</body>
</html>
