<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <title>Stock App - Stock Ingeven</title>
  <link rel="stylesheet" href="css/style.css">
  <style>
    table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 1rem;
      font-size: 0.95rem;
    }
    th, td {
      border: 1px solid #ddd;
      padding: 8px 10px;
      text-align: center;
    }
    th {
      background-color: #3b82f6;
      color: white;
      font-weight: bold;
    }
    tr:nth-child(even) {
      background-color: #f1f5f9;
    }
    td:first-child {
      text-align: left;
      font-weight: 500;
      min-width: 160px;
    }
    td input[type="number"] {
      width: 70px;
      padding: 4px 6px;
      border: 1px solid #ccc;
      border-radius: 4px;
      text-align: center;
      font-size: 0.9rem;
    }
    .week-bar {
      display: flex;
      align-items: center;
      gap: 1rem;
      margin-bottom: 1rem;
      background: white;
      padding: 1rem;
      border-radius: 10px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.1);
    }
    .week-bar label {
      font-weight: bold;
      margin: 0;
    }
    .week-bar input {
      width: 80px;
      padding: 6px 10px;
      border: 1px solid #ccc;
      border-radius: 6px;
      font-size: 1rem;
    }
    .btn-laden {
      background-color: #3b82f6;
      color: white;
      border: none;
      padding: 8px 20px;
      border-radius: 8px;
      font-size: 1rem;
      cursor: pointer;
      font-weight: bold;
    }
    .btn-laden:hover {
      background-color: #2563eb;
    }
    .btn-opslaan {
      margin-top: 1.2rem;
      background-color: #10b981;
      color: white;
      border: none;
      padding: 12px 30px;
      border-radius: 8px;
      font-size: 1rem;
      cursor: pointer;
      font-weight: bold;
    }
    .btn-opslaan:hover {
      background-color: #059669;
    }
    .auto-tag {
      font-size: 0.75rem;
      color: #2563eb;
      font-weight: normal;
      display: block;
    }
    #result-msg {
      margin-top: 1rem;
      font-weight: bold;
      color: green;
    }
    .nav-links {
      margin-top: 2rem;
      display: flex;
      gap: 1rem;
    }
    .nav-links a {
      color: #3b82f6;
      text-decoration: none;
      font-weight: 500;
    }
    .nav-links a:hover {
      text-decoration: underline;
    }
    .tabel-wrapper {
      background: white;
      border-radius: 10px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.1);
      padding: 1rem;
      overflow-x: auto;
    }
  </style>
</head>
<body>
  <script>
    if (localStorage.getItem("loggedIn") !== "true") {
      window.location.href = "index.html";
    }
  </script>

  <h1>Stock Ingeven</h1>

  <div class="week-bar">
    <label for="week">Weeknummer:</label>
    <input type="number" id="week" min="1" max="53" placeholder="bv. 24" required>
    <button class="btn-laden" onclick="loadProducts()">🔄 Laad producten</button>
  </div>

  <div class="tabel-wrapper">
    <table id="stock-tabel">
      <thead>
        <tr>
          <th>Product</th>
          <th>Stock begin</th>
          <th>Stock einde</th>
        </tr>
      </thead>
      <tbody id="product-rijen">
        <tr><td colspan="3" style="text-align:center; color:#888;">Vul een weeknummer in en klik op "Laad producten".</td></tr>
      </tbody>
    </table>
  </div>

  <button class="btn-opslaan" onclick="allesOpslaan()">💾 Alles opslaan</button>
  <div id="result-msg"></div>

  <div class="nav-links">
    <a href="order.html">📋 Bestelvoorstel</a>
    <a href="history.html">📜 Historiek</a>
    <a href="verbruik.html">📊 Verbruik</a>
    <a href="index.html" onclick="localStorage.removeItem('loggedIn')">🚪 Uitloggen</a>
  </div>

  <script src="js/api.js"></script>
  <script>
    let producten = [];

    async function loadProducts() {
      const week = Number(document.getElementById('week').value);
      const resultEl = document.getElementById('result-msg');
      const tbody = document.getElementById('product-rijen');

      if (!week) {
        resultEl.style.color = 'red';
        resultEl.textContent = '⚠️ Vul eerst een weeknummer in.';
        return;
      }

      resultEl.textContent = '';
      tbody.innerHTML = '<tr><td colspan="3" style="text-align:center; color:#888;">Producten laden...</td></tr>';

      try {
        producten = await apiGet('/products');
        const bestaandeStock = await apiGet(`/stock/${week}`);

        const stockPerProduct = {};
        bestaandeStock.forEach(s => { stockPerProduct[s.product_id] = s; });

        tbody.innerHTML = '';
        producten.forEach(p => {
          const stock = stockPerProduct[p.id];
          const aanvangWaarde = stock ? stock.stock_aanvang : '';
          const eindeWaarde = (stock && stock.stock_einde !== null && stock.stock_einde !== 0) ? stock.stock_einde : '';
          const autoTag = stock ? '<span class="auto-tag">automatisch ingevuld</span>' : '';

          const tr = document.createElement('tr');
          tr.innerHTML = `
            <td>${p.naam}${autoTag}</td>
            <td><input type="number" id="aanvang_${p.id}" min="0" placeholder="0" value="${aanvangWaarde}"></td>
            <td><input type="number" id="einde_${p.id}" min="0" placeholder="0" value="${eindeWaarde}"></td>
          `;
          tbody.appendChild(tr);
        });
      } catch (err) {
        resultEl.style.color = 'red';
        resultEl.textContent = '❌ Fout bij laden van producten/stock.';
      }
    }

    async function allesOpslaan() {
      const week = Number(document.getElementById('week').value);
      const resultEl = document.getElementById('result-msg');

      if (!week) {
        resultEl.style.color = 'red';
        resultEl.textContent = '⚠️ Vul eerst een weeknummer in.';
        return;
      }

      let opgeslagen = 0;
      let overgeslagen = 0;
      resultEl.style.color = '#888';
      resultEl.textContent = 'Bezig met opslaan...';

      for (const p of producten) {
        const aanvangEl = document.getElementById(`aanvang_${p.id}`);
        const eindeEl = document.getElementById(`einde_${p.id}`);

        const aanvang = aanvangEl.value;
        const einde = eindeEl.value;

        if (aanvang === '' && einde === '') {
          overgeslagen++;
          continue;
        }

        try {
          await apiPost('/stock', {
            product_id: p.id,
            week: week,
            stock_aanvang: Number(aanvang) || 0,
            stock_einde: Number(einde) || 0
          });
          opgeslagen++;
          aanvangEl.style.backgroundColor = '#d1fae5';
          eindeEl.style.backgroundColor = '#d1fae5';
        } catch (err) {
          aanvangEl.style.backgroundColor = '#fee2e2';
          eindeEl.style.backgroundColor = '#fee2e2';
        }
      }

      resultEl.style.color = 'green';
      resultEl.textContent = `✅ ${opgeslagen} producten opgeslagen, ${overgeslagen} overgeslagen (leeg).`;
    }
  </script>
</body>
</html>
